name: CI - Linux

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Added libxcb-cursor0 for Qt 6.5 xcb engine and xvfb for running headless GUI tests
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libssl-dev libxkbcommon-dev libgl1-mesa-dev libxcb-cursor0 xvfb

      - name: Install Qt 6.5 (jurplel/install-qt-action)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'linux'
          target: 'desktop'

      - name: Configure
        run: |
          QT_PREFIX=$(dirname "$(dirname "$(which qmake)" )") || true
          mkdir -p build
          cd build
          cmake -S .. -B . -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${QT_PREFIX}/lib/cmake/Qt6"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          
          # --- FIXED ENVIRONMENT PATH ASSIGNMENT FOR UBUNTU 24.04 ---
          export OPENSSL_MODULES=/usr/lib/x86_64-linux-gnu/ossl-modules
          
          # Run headless GUI tests safely
          xvfb-run ctest -j 2 --output-on-failure