name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        shell: bash
        run: |
          cmake --build build --parallel

      - name: Deploy Qt
        shell: pwsh
        run: |
          cd build

          $exePath = Get-ChildItem -Recurse -Filter "AstraNotes.exe" |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $exePath) {
            throw "AstraNotes.exe not found!"
          }

          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" `
            --release `
            --compiler-runtime `
            $exePath

          $deployDir = Split-Path $exePath

          if (!(Test-Path "$deployDir/sqldrivers/qsqlite.dll")) {
            throw "SQLite plugin missing!"
          }

          Compress-Archive `
            -Path "$deployDir/*" `
            -DestinationPath "../AstraNotes-Windows.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AstraNotes-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}