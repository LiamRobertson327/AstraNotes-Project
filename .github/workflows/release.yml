name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          # We use 6.5.3 as it is the most stable Long Term Support version 
          # for these build servers.
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Configure and Build
        shell: bash
        run: |
          mkdir build
          cd build
          # We use the Qt environment variables set by the 'install-qt-action'
          # This ensures CMake knows exactly where the libraries are.
          cmake -G "MinGW Makefiles" \
                -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
                -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Package with Windeployqt
        shell: pwsh
        run: |
          cd build
          # Use PowerShell to find the exe regardless of folder structure
          $exePath = Get-ChildItem -Recursion -Filter "AstraNotes.exe" | Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $exePath) { throw "AstraNotes.exe not found!" }
          
          # Use the windeployqt from the Qt installation we just downloaded
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release --no-translations --compiler-runtime $exePath
          
          # Zip the deployment directory
          $deployDir = Split-Path $exePath
          7z a ../AstraNotes-Windows.zip "$deployDir/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: AstraNotes-Windows.zip
          name: AstraNotes ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}