name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3' # Stable LTS version
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Setup MinGW Path
        # We use the MinGW already present on the Windows runner instead of installing a new one
        run: |
          echo "C:\ProgramData\Chocolatey\bin" >> $GITHUB_PATH
          echo "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Package with Windeployqt
        shell: pwsh
        run: |
          cd build
          # Find the exe regardless of whether CMake put it in /build or /build/Release
          $exePath = Get-ChildItem -Recursion -Filter "AstraNotes.exe" | Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $exePath) { throw "AstraNotes.exe not found!" }
          
          # Run windeployqt on the found path
          windeployqt --release --no-translations --compiler-runtime $exePath
          
          # Zip everything in the folder where the exe was found
          $deployDir = Split-Path $exePath
          7z a ../AstraNotes-Windows.zip "$deployDir/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: AstraNotes-Windows.zip
          name: AstraNotes ${{ github.ref_name }}
          body: |
            Automated Release for AstraNotes.
            - Portable Windows build.
            - Database stored in application directory.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}