name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Set up MinGW
        # Instead of the external action, we just add the pre-installed MinGW to the PATH
        run: |
          echo "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          # Explicitly tell CMake to use MinGW
          cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release

      - name: Package with Windeployqt
        run: |
          cd build
          # windeployqt usually handles the folder structure, but we specify the path to the exe
          # Note: CMake with MinGW often puts the exe directly in /build/ or /build/Release/
          if (Test-Path "AstraNotes.exe") { $exePath = "AstraNotes.exe" }
          else { $exePath = "Release/AstraNotes.exe" }
          
          windeployqt --release --no-translations --compiler-runtime $exePath
          
          # Create the zip
          7z a ../AstraNotes-Windows.zip ./*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: AstraNotes-Windows.zip
          name: AstraNotes ${{ github.ref_name }}
          body: |
            Portable Windows Release for AstraNotes.
            Download the ZIP, extract all files, and run AstraNotes.exe.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
