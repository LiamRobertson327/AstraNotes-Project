name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Remove MinGW from PATH
        # This prevents the 'ld.exe' error by hiding MinGW from CMake
        shell: pwsh
        run: |
          $path = $env:PATH -split ';' | Where-Object { $_ -notlike "*mingw*" }
          $path = $path -join ';'
          echo "PATH=$path" >> $env:GITHUB_ENV

      - name: Configure and Build
        shell: pwsh
        run: |
          mkdir build
          cd build
          # Explicitly tell CMake to use the Visual Studio 'cl' compiler
          cmake -G "Ninja" `
                -DCMAKE_C_COMPILER=cl `
                -DCMAKE_CXX_COMPILER=cl `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" ..
          cmake --build . --config Release

      - name: Package with Windeployqt
        shell: pwsh
        run: |
          cd build
          $exePath = Get-ChildItem -Recursion -Filter "AstraNotes.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) { throw "AstraNotes.exe not found!" }
          
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release --no-translations --compiler-runtime $exePath
          
          $deployDir = Split-Path $exePath
          7z a ../AstraNotes-Windows.zip "$deployDir/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AstraNotes-Windows.zip
          name: AstraNotes ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}