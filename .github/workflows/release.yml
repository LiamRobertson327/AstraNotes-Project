name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          setup-python: false
          cache: true
          tools-only: false

      - name: Configure CMake
        shell: bash
        run: |
          mkdir build
          cd build

          cmake .. \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DCMAKE_C_COMPILER="$QT_ROOT_DIR/Tools/mingw1120_64/bin/gcc.exe" \
            -DCMAKE_CXX_COMPILER="$QT_ROOT_DIR/Tools/mingw1120_64/bin/g++.exe"

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --parallel

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          cd build

          $exePath = Get-ChildItem -Recurse -Filter "AstraNotes.exe" |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $exePath) {
            throw "AstraNotes.exe not found!"
          }

          Write-Host "Found exe: $exePath"

          $windeployqt = "$env:QT_ROOT_DIR/bin/windeployqt.exe"

          & $windeployqt `
            --release `
            --compiler-runtime `
            --no-translations `
            $exePath

          $deployDir = Split-Path $exePath

          Compress-Archive `
            -Path "$deployDir/*" `
            -DestinationPath "../AstraNotes-Windows.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AstraNotes-Windows.zip
          name: AstraNotes ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}