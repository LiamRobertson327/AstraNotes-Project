name: Build and Release

on:
  push:
    tags:
      - 'v*'
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Remove MinGW from PATH
        # This prevents the 'ld.exe' error by hiding MinGW from CMake
        shell: pwsh
        run: |
          $path = $env:PATH -split ';' | Where-Object { $_ -notlike "*mingw*" }
          $path = $path -join ';'
          echo "PATH=$path" >> $env:GITHUB_ENV

      - name: Configure and Build
        shell: pwsh
        run: |
          mkdir build
          cd build
          # Explicitly tell CMake to use the Visual Studio 'cl' compiler
          cmake -G "Ninja" `
                -DCMAKE_C_COMPILER=cl `
                -DCMAKE_CXX_COMPILER=cl `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" ..
          cmake --build . --config Release

      - name: Run Smoke Tests
        shell: pwsh
        run: |
          cd build
          ctest -C Release --output-on-failure

      - name: Package with Windeployqt
        shell: pwsh
        run: |
          cd build
          $exePath = Get-ChildItem -Recurse -Filter "AstraNotes.exe" | Select-Object -First 1 -ExpandProperty FullName
          mkdir AstraNotesTaker
          copy $exePath AstraNotesTaker/

          # 1. Run windeployqt
          $deployTool = Get-ChildItem -Path "$env:Qt6_DIR" -Recurse -Filter "windeployqt.exe" | Select-Object -First 1 -ExpandProperty FullName
          & $deployTool --release --no-translations --compiler-runtime AstraNotesTaker/AstraNotes.exe
          
          # 2. FIX: Copy OpenSSL DLLs from the ACTUAL OpenSSL install path
          # We know from logs it is at C:\Program Files\OpenSSL\bin
          Write-Host "Bundling OpenSSL DLLs from System Path..."
          copy "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll" AstraNotesTaker/
          copy "C:\Program Files\OpenSSL\bin\libssl-3-x64.dll" AstraNotesTaker/

          # 3. FIX: Copy the modules folder if it exists there
          if (Test-Path "C:\Program Files\OpenSSL\bin\ossl-modules") {
              xcopy /E /I "C:\Program Files\OpenSSL\bin\ossl-modules" AstraNotesTaker/ossl-modules
          }

          # 4. Zip it up
          7z a ../AstraNotes-Windows.zip "AstraNotesTaker/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AstraNotes-Windows.zip
          name: AstraNotes ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}